<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaleidoscope — Podcast Title Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e0ddd6;
      --border2: #ccc9c0;
      --text: #1a1916;
      --text2: #6b6860;
      --text3: #9e9b93;
      --accent: #0A2CE3;
      --accent-bg: #e8edfb;
      --accent-text: #071a8a;
      --purple: #4a3f7a;
      --info-bg: #e8f0fe;
      --info-text: #1a3a6b;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
    .container { max-width: 740px; margin: 0 auto; }
    header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .eyebrow { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    h1 { font-size: 28px; font-weight: normal; letter-spacing: -.02em; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
    .tagline { font-size: 14px; color: var(--text2); line-height: 1.6; font-family: 'Helvetica Neue', sans-serif; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-family: 'Helvetica Neue', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }
    label .opt { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text3); font-size: 11px; }
    textarea, input[type="text"], select { width: 100%; font-family: 'Helvetica Neue', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; line-height: 1.6; transition: border-color .15s; appearance: none; }
    textarea { min-height: 150px; resize: vertical; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent); }
    .opt-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .btn-primary { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .04em; padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: opacity .15s; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .4; cursor: default; }
    .section { margin-top: 1.75rem; }
    .sec-label { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .hooks-grid { display: flex; flex-direction: column; gap: 8px; }
    .hook-card { display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); overflow: hidden; transition: border-color .15s; }
    .hook-card.selected { border-color: var(--accent); border-width: 1.5px; }
    .hook-letter { width: 38px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; font-size: 12px; color: var(--text3); background: var(--surface2); border-right: 1px solid var(--border); }
    .hook-body { flex: 1; padding: 12px 14px; }
    .hook-text { font-size: 14px; line-height: 1.4; color: var(--text); margin-bottom: 4px; }
    .hook-angle { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--text2); line-height: 1.5; }
    .hook-actions { display: flex; align-items: center; padding: 0 14px; flex-shrink: 0; }
    .btn-pick { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); white-space: nowrap; transition: all .15s; }
    .btn-pick:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
    .btn-pick.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
    .titles-grid { display: flex; flex-direction: column; gap: 8px; }
    .t-row { display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); overflow: hidden; transition: border-color .15s; }
    .t-row.selected { border-color: var(--accent); border-width: 1.5px; }
    .t-num { width: 38px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; font-size: 12px; color: var(--text3); background: var(--surface2); border-right: 1px solid var(--border); }
    .t-body { flex: 1; padding: 12px 14px; }
    .t-title { font-size: 15px; font-weight: normal; margin-bottom: 5px; line-height: 1.4; color: var(--text); }
    .score-bar { display: flex; gap: 12px; margin-bottom: 5px; }
    .score-item { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-seo { background: var(--accent); }
    .dot-click { background: var(--purple); }
    .t-why { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--text2); line-height: 1.5; }
    .t-actions { display: flex; align-items: center; padding: 0 14px; flex-shrink: 0; }
    .kw-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--info-bg); color: var(--info-text); }
    .desc-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .desc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .selected-title-display { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--text); padding-bottom: 10px; border-bottom: 1px solid var(--border); font-family: 'Helvetica Neue', sans-serif; }
    .desc-text { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
    .copy-btn { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; padding: 5px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; }
    .copy-btn:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
    .loading { font-family: 'Helvetica Neue', sans-serif; font-size: 14px; color: var(--text2); padding: .75rem 0; }
    .err { font-family: 'Helvetica Neue', sans-serif; font-size: 14px; color: #a03030; padding: .5rem 0; }
    .hint { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--text3); margin-top: 10px; }
    .restart-btn { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; margin-top: 1.5rem; display: block; }
    .restart-btn:hover { color: var(--text2); }
    @media (max-width: 520px) { h1 { font-size: 22px; } .opt-row { grid-template-columns: 1fr; } .t-actions, .hook-actions { padding: 0 10px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">Kaleidoscope — Internal Idea Generation Tool</div>
      <h1>Podcast Title Generator</h1>
      <p class="tagline">Based on Christy's SEO principles and titling advice — use these as a starting point, not a final answer. Paste a transcript, pick a hook, then get title options built around it.</p>
    </header>

    <div id="step1-ui">
      <div class="card">
        <div class="field">
          <label>Episode transcript or summary</label>
          <textarea id="ep" placeholder="Paste your episode transcript or a short summary here..."></textarea>
        </div>
        <div class="divider"></div>
        <div class="opt-row">
          <div class="field">
            <label>Show name <span class="opt">(optional)</span></label>
            <input type="text" id="show" placeholder="e.g. TechStuff" />
          </div>
          <div class="field">
            <label>Episode format <span class="opt">(optional)</span></label>
            <select id="format">
              <option value="">— not specified —</option>
              <option value="interview">Interview</option>
              <option value="solo">Solo / monologue</option>
              <option value="news recap">News recap / chat show</option>
              <option value="narrative">Narrative / documentary</option>
            </select>
          </div>
          <div class="field">
            <label>Tone</label>
            <select id="tone">
              <option value="balanced">Balanced (SEO + curiosity)</option>
              <option value="seo">SEO-forward</option>
              <option value="clickable">Clickability-forward</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" id="hooksBtn" onclick="findHooks()">Find hooks →</button>
      </div>
    </div>

    <div id="out"></div>
  </div>

  <script>
    const HOOKS_SYSTEM = `You are a podcast titling expert trained on Christy Mirabal's framework at Kaleidoscope. Your first job is to identify the best hooks in a podcast transcript.

A HOOK is a specific angle, moment, insight, or tension in the episode that could anchor a great title. Good hooks have:
- Clear, high stakes — something that makes the listener feel "oh shit" or "I need to know this"
- A curiosity gap — makes you want to know the answer
- Concrete detail — a number, comparison, superlative, or specific moment
- Emotional pull — dangerous, surprising, controversial, revelatory

EXAMPLES OF GOOD HOOKS:
- "The moment the AI race became impossible to stop" — urgency, stakes, historical weight
- "AI's Manhattan Project" — powerful comparison, instantly creates stakes
- "Are dentists scamming us? We investigate" — relatable fear, format indicator, promise of answer
- A $20,000 drone vs a $5 million missile — concrete numbers that set stakes

EXAMPLES OF BAD HOOKS:
- "How Google DeepMind accidentally started the AI race" — no POV, no stakes, generic
- "Should athletes be allowed to bet on themselves?" — unclear stakes, no urgency

OUTPUT ONLY valid JSON, no markdown, no preamble:
{
  "hooks": [
    {
      "hook": "The hook itself — a phrase, tension, or angle from the episode",
      "angle": "One sentence on why this is a strong hook and what title direction it suggests."
    }
  ]
}

Identify exactly 4 hooks. Vary them — different angles, different levels of stakes, different emotional tones.`;

    const TITLES_SYSTEM = `You are a podcast titling expert trained on Christy Mirabal's framework and additional team insights at Kaleidoscope.

CHRISTY'S CORE FRAMEWORK:
- Two jobs of a title: (1) FIND IT — SEO: clarity, proper nouns, searchable anchors; (2) CLICK IT — curiosity, stakes, tension
- Target the middle-tier listener who decides based on episode metadata, not the superfan
- Hook first — most important word or name goes at the very start (titles truncate around 50-60 characters on mobile)
- Surface proper nouns in the title itself, not just the description
- Two-second test: instantly clear AND compelling in 2 seconds
- Data-informed, not data-led — preserve the show's editorial voice

ADDITIONAL PRINCIPLES FROM THE TEAM:
- Stakes are everything — use superlatives, powerful comparisons, concrete numbers, strong verbs
- Curiosity gap — make the listener want to know the answer, create that "oh shit" feeling
- Clarity first — even insiders should immediately know what they will GET from the episode
- Don't lead with proper nouns people might not know — SEO must be meaningful, not just insider-recognizable
- Format indicators work — "we investigate," "breaking down," "explained," "comparing X and Y"
- Verbs and action words outperform passive descriptions
- There's a spectrum — amp it up but don't go full YouTube slop/clickbait
- Front-load everything — truncation hits at ~50-60 characters on mobile

GOOD EXAMPLES:
- "Are dentists scamming us? We investigate" — relatable, format indicator, promise of answer
- "The moment the AI race became impossible to stop" — urgency, stakes, historical weight
- "AI's Manhattan Project: how the race for AI began" — powerful comparison, immediate stakes

BAD EXAMPLES:
- "How Google DeepMind accidentally started the AI race" — no POV, no stakes, generic
- "Should athletes be allowed to bet on themselves?" — unclear stakes, no urgency, no reason to listen now

FORMATTING RULES:
- No em dashes (—) anywhere in titles
- No "X vs Y" or "It's not X, it's Y" constructions — these are clichéd AI title patterns
- No colons unless absolutely necessary

DESCRIPTION RULES:
- Weave the top keyword naturally 3-4 times
- Open with a punchy hook — never a vague opener
- Include 3 bulleted talking points as timestamp anchors
- End with a compelling close, 150-200 words total

OUTPUT ONLY valid JSON, no markdown, no preamble:
{
  "titles": [
    { "title": "...", "seo_score": 1-10, "click_score": 1-10, "why": "One sentence on what makes this work." }
  ],
  "top_keywords": ["keyword1", "keyword2", "keyword3"],
  "description": "Full episode description here."
}

Generate exactly 4 title options inspired by the selected hook. Use the hook as a creative direction and angle — not as literal language to repeat. Each title should feel distinct, vary in structure and wording, but all should capture the same underlying tension or stakes that made the hook compelling.`;

    let _ep = '', _show = '', _format = '', _tone = '', _titles = [], _desc = '';

    async function findHooks() {
      const ep = document.getElementById('ep').value.trim();
      if (!ep) return;
      _ep = ep;
      _show = document.getElementById('show').value.trim();
      _format = document.getElementById('format').value;
      _tone = document.getElementById('tone').value;

      const btn = document.getElementById('hooksBtn');
      const out = document.getElementById('out');
      btn.disabled = true;
      out.innerHTML = '<p class="loading">Identifying hooks from your transcript...</p>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 800,
            system: HOOKS_SYSTEM,
            messages: [{ role: 'user', content: `Find the best hooks in this episode:\n\n${ep.slice(0, 8000)}` }]
          })
        });
        const data = await res.json();
        if (data.error) { out.innerHTML = `<p class="err">Error: ${data.error.message || data.error}</p>`; btn.disabled = false; return; }
        const text = data.content?.find(b => b.type === 'text')?.text || '';
        let parsed;
        try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
        catch { out.innerHTML = '<p class="err">Could not parse response. Try again.</p>'; btn.disabled = false; return; }
        renderHooks(parsed.hooks || []);
      } catch(e) {
        out.innerHTML = '<p class="err">Network error. Try again.</p>';
      }
      btn.disabled = false;
    }

    let _hooks = [];

    function renderHooks(hooks) {
      _hooks = hooks;
      const letters = ['A','B','C','D'];
      const hooksHtml = hooks.map((h, i) => `
        <div class="hook-card" id="hook-${i}">
          <div class="hook-letter">${letters[i]}</div>
          <div class="hook-body">
            <div class="hook-text">${h.hook}</div>
            <div class="hook-angle">${h.angle}</div>
          </div>
          <div class="hook-actions">
            <button class="btn-pick" id="hpick-${i}" onclick="selectHook(${i})">Use this</button>
          </div>
        </div>`).join('');

      document.getElementById('out').innerHTML = `
        <div class="section">
          <div class="sec-label">Step 1 — Select a hook to build your titles from</div>
          <div class="hooks-grid">${hooksHtml}</div>
          <p class="hint">Pick the angle that best fits the episode's strongest moment. Titles will be built around it.</p>
        </div>
        <div id="titles-out"></div>`;
    }

    async function selectHook(i) {
      const hookText = _hooks[i]?.hook || '';
      document.querySelectorAll('.hook-card').forEach((el, idx) => el.classList.toggle('selected', idx === i));
      document.querySelectorAll('[id^="hpick-"]').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
        el.textContent = idx === i ? 'Selected' : 'Use this';
      });
      _titles = []; _desc = '';

      const titlesOut = document.getElementById('titles-out');
      titlesOut.innerHTML = '<p class="loading" style="margin-top:1.5rem">Generating titles from selected hook...</p>';

      const toneNote = _tone === 'seo' ? 'Lean heavily toward SEO clarity.' : _tone === 'clickable' ? 'Lean heavily toward curiosity and clickability.' : 'Balance SEO and clickability equally.';
      const context = [
        _show ? `Show name: ${_show}` : '',
        _format ? `Episode format: ${_format}` : '',
        `Tone preference: ${toneNote}`,
        `Selected hook: "${hookText}"`
      ].filter(Boolean).join('\n');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: TITLES_SYSTEM,
            messages: [{ role: 'user', content: `${context}\n\nEpisode content:\n${_ep.slice(0, 8000)}` }]
          })
        });
        const data = await res.json();
        if (data.error) { titlesOut.innerHTML = `<p class="err" style="margin-top:1rem">Error: ${data.error.message || data.error}</p>`; return; }
        const text = data.content?.find(b => b.type === 'text')?.text || '';
        let parsed;
        try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
        catch { titlesOut.innerHTML = '<p class="err" style="margin-top:1rem">Could not parse. Try again.</p>'; return; }
        _titles = parsed.titles || [];
        _desc = parsed.description || '';
        renderTitles(parsed);
      } catch(e) {
        titlesOut.innerHTML = '<p class="err" style="margin-top:1rem">Network error. Try again.</p>';
      }
    }

    function renderTitles(parsed) {
      const titlesHtml = _titles.map((t, i) => `
        <div class="t-row" id="trow-${i}">
          <div class="t-num">${i+1}</div>
          <div class="t-body">
            <div class="t-title">${t.title}</div>
            <div class="score-bar">
              <div class="score-item"><span class="dot dot-seo"></span>SEO ${t.seo_score}/10</div>
              <div class="score-item"><span class="dot dot-click"></span>Click ${t.click_score}/10</div>
            </div>
            <div class="t-why">${t.why}</div>
          </div>
          <div class="t-actions">
            <button class="btn-pick" id="tpick-${i}" onclick="selectTitle(${i})">Use this</button>
          </div>
        </div>`).join('');

      const kwHtml = (parsed.top_keywords||[]).map(k=>`<span class="pill">${k}</span>`).join('');

      document.getElementById('titles-out').innerHTML = `
        <div class="section">
          <div class="sec-label">Step 2 — Choose your title</div>
          <div class="titles-grid">${titlesHtml}</div>
          <p class="hint">Select a title using "Use this" to generate your draft episode description.</p>
        </div>
        <div class="section">
          <div class="sec-label">Top keywords detected</div>
          <div class="kw-pills">${kwHtml}</div>
        </div>
        <div id="desc-section" style="display:none">
          <div class="section">
            <div class="desc-box">
              <div class="desc-header">
                <div class="sec-label" style="margin-bottom:0">Episode description</div>
                <button class="copy-btn" onclick="copyAll()">Copy title + description</button>
              </div>
              <div class="selected-title-display" id="selected-title-display"></div>
              <div class="desc-text">${_desc}</div>
            </div>
          </div>
        </div>
        <button class="restart-btn" onclick="restart()">Start over with a new transcript</button>`;
    }

    function selectTitle(i) {
      document.querySelectorAll('.t-row').forEach((el,idx) => el.classList.toggle('selected', idx===i));
      document.querySelectorAll('[id^="tpick-"]').forEach((el,idx) => {
        el.classList.toggle('active', idx===i);
        el.textContent = idx===i ? 'Selected' : 'Use this';
      });
      const t = _titles[i];
      if (t) {
        document.getElementById('selected-title-display').textContent = t.title;
        document.getElementById('desc-section').style.display = 'block';
      }
    }

    function copyAll() {
      const titleEl = document.getElementById('selected-title-display');
      const text = (titleEl?.textContent ? titleEl.textContent+'\n\n' : '') + _desc;
      navigator.clipboard.writeText(text).catch(()=>{});
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(()=>btn.textContent='Copy title + description', 2000);
    }

    function restart() {
      document.getElementById('ep').value = '';
      document.getElementById('show').value = '';
      document.getElementById('format').value = '';
      document.getElementById('out').innerHTML = '';
      document.getElementById('hooksBtn').disabled = false;
      window.scrollTo(0,0);
    }
  </script>
</body>
</html>
